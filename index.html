<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#13110f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spinmates" />
  <meta name="description" content="Spinmates wheel app with installable offline support." />
  <title>Spinmates</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.72rem + 0.2vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.84rem + 0.25vw, 1rem);
      --text-base: clamp(1rem, 0.98rem + 0.18vw, 1.05rem);
      --text-lg: clamp(1.125rem, 1.06rem + 0.45vw, 1.3rem);
      --text-xl: clamp(1.4rem, 1.2rem + 0.8vw, 1.8rem);
      --space-1: .25rem; --space-2: .5rem; --space-3: .75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #f6f3ef; --color-surface: #fcfaf7; --color-surface-2: #ffffff; --color-surface-offset: #efe8df; --color-border: #ded6cc;
      --color-text: #211c18; --color-text-muted: #6e675f; --color-text-faint: #988f86; --color-text-inverse: #fffaf7;
      --color-primary: #922754; --color-primary-hover: #771e45; --color-primary-soft: #f5dfe8;
      --color-accent: #3a7392; --color-gold: #be8c35;
      --radius-sm: .5rem; --radius-md: .9rem; --radius-lg: 1.25rem; --radius-xl: 1.6rem; --radius-full: 9999px;
      --shadow-sm: 0 2px 6px rgba(28,20,14,.06); --shadow-md: 0 12px 28px rgba(28,20,14,.10); --shadow-lg: 0 22px 48px rgba(28,20,14,.14);
      --font-body: 'Inter', system-ui, sans-serif;
      --ring: 0 0 0 3px color-mix(in srgb, var(--color-primary) 22%, transparent);
      --tabbar-height: 86px;
    }
    [data-theme="dark"] {
      --color-bg: #13110f; --color-surface: #1b1816; --color-surface-2: #24211e; --color-surface-offset: #2b2621; --color-border: #3a342e;
      --color-text: #f1e9e1; --color-text-muted: #b3a89f; --color-text-faint: #7d746d; --color-text-inverse: #171311;
      --color-primary: #d16b97; --color-primary-hover: #bb4f7f; --color-primary-soft: #3a2630;
      --color-accent: #77aac7; --color-gold: #dfb459;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.22); --shadow-md: 0 16px 36px rgba(0,0,0,.30); --shadow-lg: 0 28px 54px rgba(0,0,0,.38);
      --ring: 0 0 0 3px color-mix(in srgb, var(--color-primary) 28%, transparent);
    }
    *,*::before,*::after{box-sizing:border-box}
    html{-webkit-text-size-adjust:none;text-size-adjust:none}
    body{margin:0;min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);line-height:1.5;color:var(--color-text);background:radial-gradient(circle at top center, color-mix(in srgb, var(--color-primary) 14%, transparent), transparent 30%),radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--color-accent) 8%, transparent), transparent 26%),var(--color-bg)}
    img,svg,canvas{display:block;max-width:100%}
    button,input,textarea,select{font:inherit;color:inherit}
    button{cursor:pointer}
    :focus-visible{outline:none;box-shadow:var(--ring)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .app-shell{max-width:480px;min-height:100dvh;margin:0 auto;display:grid;grid-template-rows:auto 1fr auto}
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:calc(env(safe-area-inset-top) + .8rem) var(--space-4) .9rem;background:color-mix(in srgb, var(--color-bg) 78%, transparent);backdrop-filter:blur(16px);border-bottom:1px solid color-mix(in srgb,var(--color-text) 8%, transparent)}
    .brand{display:flex;align-items:center;gap:.85rem;min-width:0}
    .brand-mark{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:var(--color-primary);background:linear-gradient(145deg, color-mix(in srgb, var(--color-primary) 20%, var(--color-surface-offset)), color-mix(in srgb, var(--color-accent) 8%, var(--color-surface)));border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);box-shadow:var(--shadow-sm);flex:0 0 auto}
    .brand-mark svg{width:24px;height:24px}
    .brand-copy h1{margin:0;font-size:var(--text-lg);letter-spacing:-0.03em;line-height:1.05}
    .top-actions{display:flex;align-items:center;gap:var(--space-2)}
    .icon-btn,.btn,.chip,.sheet-switch button{border:1px solid color-mix(in srgb,var(--color-text) 12%, transparent);transition:transform 180ms cubic-bezier(.16,1,.3,1),background 180ms cubic-bezier(.16,1,.3,1),border-color 180ms cubic-bezier(.16,1,.3,1),opacity 180ms cubic-bezier(.16,1,.3,1),box-shadow 180ms cubic-bezier(.16,1,.3,1)}
    .icon-btn:active,.btn:active,.sheet-switch button:active,.nav-btn:active{transform:scale(.98)}
    .icon-btn{min-width:44px;min-height:44px;border-radius:var(--radius-full);background:color-mix(in srgb,var(--color-surface) 92%, transparent);display:grid;place-items:center;padding:0 .9rem;box-shadow:var(--shadow-sm)}
    .main{padding:var(--space-4);padding-bottom:calc(var(--tabbar-height) + 1.25rem + env(safe-area-inset-bottom));display:grid;gap:var(--space-4);align-content:start}
    .card{background:linear-gradient(180deg, color-mix(in srgb,var(--color-surface) 94%, transparent), color-mix(in srgb,var(--color-surface-2) 96%, transparent));border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);border-radius:var(--radius-xl);box-shadow:var(--shadow-md)}
    .wheel-card,.hero-card{padding:var(--space-4);display:grid;gap:var(--space-4)}
    .eyebrow{font-size:var(--text-xs);letter-spacing:.14em;text-transform:uppercase;color:var(--color-text-muted);font-weight:700}
    .small{font-size:var(--text-sm);color:var(--color-text-muted)}
    .wheel-top{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)}
    .wheel-stage{position:relative;width:min(100%,360px);aspect-ratio:1/1;margin:0 auto;display:grid;place-items:center}
    .wheel-shell{position:relative;width:100%;height:100%;display:grid;place-items:center;border-radius:50%;background:radial-gradient(circle at center, color-mix(in srgb,var(--color-surface-2) 84%, transparent), transparent 60%)}
    .wheel-halo{position:absolute;inset:5%;border-radius:50%;background:radial-gradient(circle, color-mix(in srgb,var(--color-primary) 14%, transparent), transparent 62%);filter:blur(10px);pointer-events:none}
    canvas{width:100%;height:100%;filter:drop-shadow(0 18px 34px rgba(0,0,0,.24))}
    .pointer{position:absolute;top:4px;left:50%;transform:translateX(-50%);width:0;height:0;z-index:3;border-left:16px solid transparent;border-right:16px solid transparent;border-top:28px solid var(--color-gold);filter:drop-shadow(0 4px 8px rgba(0,0,0,.22))}
    .hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:104px;height:104px;border-radius:50%;background:radial-gradient(circle at 35% 30%, color-mix(in srgb, white 10%, var(--color-primary)), var(--color-primary));color:var(--color-text-inverse);border:8px solid color-mix(in srgb,var(--color-primary) 32%, var(--color-surface));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem;box-shadow:var(--shadow-lg);z-index:4}
    .hub:disabled{opacity:.72;cursor:wait}
    .spin-logo{width:28px;height:28px}.hub span{font-size:.78rem;font-weight:800;letter-spacing:.12em}
    .utility-row{display:grid;grid-template-columns:1fr auto;gap:var(--space-2);align-items:center}
    .timer-inline{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap}
    select,input,textarea{width:100%;padding:.9rem 1rem;border-radius:var(--radius-md);border:1px solid color-mix(in srgb,var(--color-text) 12%, transparent);background:color-mix(in srgb,var(--color-surface-2) 88%, transparent);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
    .timer-pill{min-width:76px;justify-content:center;font-variant-numeric:tabular-nums;font-weight:800;background:color-mix(in srgb,var(--color-primary) 15%, var(--color-surface))}
    .result-block{display:grid;gap:var(--space-3)}
    .result-block h2{margin:0;font-size:var(--text-xl);letter-spacing:-0.045em;line-height:1.02}
    .meta{display:flex;flex-wrap:wrap;gap:var(--space-2)}
    .chip{padding:.48rem .8rem;border-radius:var(--radius-full);background:color-mix(in srgb,var(--color-surface-2) 92%, transparent);font-size:var(--text-xs);font-weight:700}
    .suggestion-card{position:relative;overflow:hidden;padding:var(--space-4);border-radius:var(--radius-lg);background:linear-gradient(180deg, color-mix(in srgb,var(--color-surface-offset) 90%, transparent), color-mix(in srgb,var(--color-surface) 88%, transparent));border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent)}
    .suggestion-card::before{content:"";position:absolute;left:0;top:0;width:100%;height:3px;background:linear-gradient(90deg,var(--color-primary),var(--color-accent),var(--color-gold))}
    .suggestion-text{margin-top:.35rem}
    .actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)}
    .btn{min-height:48px;padding:.82rem 1rem;border-radius:var(--radius-full);background:var(--color-surface);box-shadow:var(--shadow-sm)}
    .btn-primary{background:linear-gradient(180deg, color-mix(in srgb,var(--color-primary) 90%, white 10%), var(--color-primary));color:var(--color-text-inverse);border-color:transparent}
    .btn-soft{background:color-mix(in srgb,var(--color-surface-offset) 88%, transparent)}
    .tabbar{position:sticky;bottom:0;z-index:20;padding:0 var(--space-4) calc(.65rem + env(safe-area-inset-bottom));background:linear-gradient(180deg, transparent, color-mix(in srgb, var(--color-bg) 85%, transparent) 24%, color-mix(in srgb, var(--color-bg) 96%, transparent))}
    .tabbar-inner{height:var(--tabbar-height);display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2);align-items:center;padding:.7rem;border-radius:1.6rem;background:color-mix(in srgb,var(--color-surface) 92%, transparent);border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);box-shadow:var(--shadow-lg);backdrop-filter:blur(14px)}
    .nav-btn{min-height:56px;border-radius:1.1rem;background:transparent;border:0;display:grid;place-items:center;gap:.18rem;color:var(--color-text-muted)}
    .nav-btn span{font-size:var(--text-xs);font-weight:700}
    .nav-btn.is-active{background:color-mix(in srgb,var(--color-primary) 16%, var(--color-surface));color:var(--color-text)}
    .nav-icon{font-size:1.05rem;line-height:1}
    .sheet-overlay{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s ease}
    .sheet-overlay.is-open{opacity:1;pointer-events:auto}
    .manage-sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%, 100%);width:min(100%, 480px);max-height:86dvh;z-index:50;display:grid;grid-template-rows:auto 1fr;transition:transform .26s cubic-bezier(.16,1,.3,1);padding:0 var(--space-3) calc(var(--space-3) + env(safe-area-inset-bottom))}
    .manage-sheet.is-open{transform:translate(-50%, 0)}
    .sheet-window{background:linear-gradient(180deg, color-mix(in srgb,var(--color-surface) 96%, transparent), color-mix(in srgb,var(--color-surface-2) 98%, transparent));border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);border-radius:1.5rem 1.5rem 1rem 1rem;box-shadow:var(--shadow-lg);overflow:hidden;display:grid;grid-template-rows:auto auto 1fr}
    .sheet-grabber{width:48px;height:5px;border-radius:999px;background:color-mix(in srgb,var(--color-text) 18%, transparent);margin:.8rem auto .35rem}
    .sheet-header{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:0 var(--space-4) var(--space-3)}
    .sheet-title h3{margin:0;font-size:var(--text-lg);letter-spacing:-0.03em}
    .sheet-title p{margin:.2rem 0 0;font-size:var(--text-sm);color:var(--color-text-muted)}
    .sheet-close{min-width:40px;min-height:40px;border-radius:var(--radius-full);background:color-mix(in srgb,var(--color-surface-offset) 92%, transparent)}
    .sheet-switch{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);padding:0 var(--space-4) var(--space-4)}
    .sheet-switch button{min-height:44px;border-radius:var(--radius-full);background:color-mix(in srgb,var(--color-surface-offset) 88%, transparent);font-weight:700}
    .sheet-switch button.is-active{background:var(--color-surface-2);box-shadow:var(--shadow-sm)}
    .sheet-body{overflow:auto;padding:0 var(--space-4) var(--space-4);display:grid;gap:var(--space-4)}
    .tab-panel{display:none;gap:var(--space-3)}
    .tab-panel.is-active{display:grid}
    .field{display:grid;gap:var(--space-2)}
    .field label{font-size:var(--text-sm);font-weight:600}
    .field textarea{min-height:110px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
    .segmented{display:flex;gap:var(--space-2);flex-wrap:wrap}
    .segmented button{padding:.55rem .8rem;border-radius:var(--radius-full);background:var(--color-surface-2);border:1px solid color-mix(in srgb,var(--color-text) 12%, transparent);font-size:var(--text-xs);font-weight:700}
    .segmented button.is-active{background:color-mix(in srgb,var(--color-primary) 18%, var(--color-surface));border-color:color-mix(in srgb,var(--color-primary) 40%, transparent)}
    .list{display:grid;gap:var(--space-3);max-height:none;overflow:visible}
    .item{padding:var(--space-4);border-radius:var(--radius-lg);background:linear-gradient(180deg, color-mix(in srgb,var(--color-surface) 95%, transparent), color-mix(in srgb,var(--color-surface-offset) 88%, transparent));border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);display:grid;gap:var(--space-3)}
    .item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-3)}
    .item h3{margin:0;font-size:var(--text-base);letter-spacing:-0.02em}
    .item-actions{display:flex;gap:var(--space-2);flex-wrap:wrap;justify-content:flex-end}
    .danger{background:#8c2b51;color:#fff;border-color:transparent}
    .empty{padding:var(--space-5);text-align:center;color:var(--color-text-muted);border:1px dashed color-mix(in srgb,var(--color-text) 16%, transparent);border-radius:var(--radius-lg)}
    @media (min-width: 900px){.app-shell{max-width:1120px}.main{grid-template-columns:1.02fr .98fr;align-items:start}.wheel-card{grid-column:1}.hero-card{grid-column:2}.manage-sheet{width:min(520px, 92vw)}}
    @media (max-width: 380px){.main,.topbar,.tabbar{padding-left:var(--space-3);padding-right:var(--space-3)}.row,.actions-grid{grid-template-columns:1fr}.wheel-stage{width:min(100%,320px)}.hub{width:96px;height:96px}}
    @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <a class="sr-only" href="#main">Skip to content</a>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3">
            <circle cx="32" cy="32" r="22"></circle>
            <circle cx="32" cy="32" r="5" fill="currentColor" stroke="none"></circle>
            <path d="M32 10v8M32 46v8M10 32h8M46 32h8M16.5 16.5l5.8 5.8M41.7 41.7l5.8 5.8M47.5 16.5l-5.8 5.8M22.3 41.7l-5.8 5.8" stroke-linecap="round"></path>
          </svg>
        </div>
        <div class="brand-copy">
          <h1>Spinmates</h1>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" type="button" data-theme-toggle aria-label="Switch theme">Theme</button>
        <input id="fileInput" type="file" accept="application/json" hidden>
      </div>
    </header>

    <main id="main" class="main">
      <section class="card wheel-card">
        <div class="wheel-top">
          <div>
            <div class="eyebrow">Spin wheel</div>
            <div class="small">Tap the center to choose</div>
          </div>
          <div class="chip timer-pill" id="timerDisplay">01:00</div>
        </div>
        <div class="wheel-stage">
          <div class="wheel-shell">
            <div class="wheel-halo" aria-hidden="true"></div>
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="wheelCanvas" width="960" height="960" aria-label="Spinmates wheel"></canvas>
            <button class="hub" type="button" id="spinBtn" aria-label="Spin">
              <svg class="spin-logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-width="4"></circle>
                <circle cx="32" cy="32" r="5" fill="currentColor"></circle>
                <path d="M32 10v8M32 46v8M10 32h8M46 32h8M16.5 16.5l5.8 5.8M41.7 41.7l5.8 5.8M47.5 16.5l-5.8 5.8M22.3 41.7l-5.8 5.8" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"></path>
              </svg>
              <span>SPIN</span>
            </button>
          </div>
        </div>
        <div class="utility-row">
          <div class="timer-inline">
            <select id="timerSelect" aria-label="Timer length">
              <option value="0">Timer off</option>
              <option value="30">30 sec</option>
              <option value="60" selected>60 sec</option>
              <option value="120">2 min</option>
            </select>
            <button class="btn btn-soft" type="button" id="timerStartBtn">Start</button>
          </div>
          <button class="btn" type="button" id="timerStopBtn">Reset</button>
        </div>
      </section>

      <section class="card hero-card">
        <div class="eyebrow">Current prompt</div>
        <div class="result-block">
          <h2 id="resultName"></h2>
        </div>
        <div class="meta">
          <span class="chip" id="resultCategory">Spin to begin</span>
          <span class="chip" id="resultIntensity"></span>
        </div>
        <div class="suggestion-card" id="suggestionCard" hidden>
          <div class="small">Suggested prompt</div>
          <div class="suggestion-text" id="resultSuggestion"></div>
        </div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Primary mobile sections">
      <div class="tabbar-inner">
        <button class="nav-btn is-active" type="button" data-nav-target="play"><div class="nav-icon">◎</div><span>Play</span></button>
        <button class="nav-btn" type="button" data-nav-target="edit"><div class="nav-icon">＋</div><span>Add</span></button>
        <button class="nav-btn" type="button" data-nav-target="items"><div class="nav-icon">☰</div><span>Items</span></button>
      </div>
    </nav>
  </div>

  <div class="sheet-overlay" id="sheetOverlay" hidden></div>
  <section class="manage-sheet" id="manageSheet" aria-label="Manage wheel window" aria-hidden="true">
    <div class="sheet-window">
      <div class="sheet-grabber" aria-hidden="true"></div>
      <div class="sheet-header">
        <div class="sheet-title">
          <h3>Manage wheel</h3>
          <p>Add new items or edit existing suggestions.</p>
        </div>
        <button class="sheet-close icon-btn" type="button" id="sheetCloseBtn" aria-label="Close manage wheel">✕</button>
      </div>
      <div class="sheet-switch">
        <button type="button" class="is-active" data-sheet-tab="edit">Add</button>
        <button type="button" data-sheet-tab="items">Items</button>
      </div>
      <div class="sheet-body">
        <div class="tab-panel is-active" id="panel-edit">
          <div class="field"><label for="kinkName">Name</label><input id="kinkName" placeholder="Example: Praise kink"></div>
          <div class="row">
            <div class="field"><label for="kinkCategory">Category</label><input id="kinkCategory" placeholder="Example: Verbal"></div>
            <div class="field"><label for="kinkIntensity">Intensity</label><select id="kinkIntensity"><option value="1">1 — Mild</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5 — High</option></select></div>
          </div>
          <div class="field"><label for="kinkSuggestions">Suggestions</label><textarea id="kinkSuggestions" placeholder="One suggestion per line"></textarea></div>
          <div class="field"><label for="categoryFilter">Category</label><select id="categoryFilter"></select></div>
          <div class="field"><label for="maxIntensity">Intensity cap</label><select id="maxIntensity"><option value="5">Show up to 5</option><option value="4">Show up to 4</option><option value="3">Show up to 3</option><option value="2">Show up to 2</option><option value="1">Show only 1</option></select></div>
          <button class="btn btn-primary" type="button" id="addBtn">Add to wheel</button>
        </div>
        <div class="tab-panel" id="panel-items">
          <div class="segmented" id="categoryPills"></div>
          <div class="list" id="itemList"></div>
          <div class="actions-grid">
            <button class="btn btn-soft" type="button" id="saveBtn">Save</button>
            <button class="btn btn-soft" type="button" id="loadBtn">Load</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const defaultItems = [
      { id: crypto.randomUUID(), name: 'Soft Domination', category: 'Power Play', intensity: 3, suggestions: ['Try a 10-minute scene with one clear instruction, one agreed boundary, and a debrief after.', 'Pick a phrase of authority and pair it with gentle physical positioning.', 'Use a timer and switch roles after the check-in.'] },
      { id: crypto.randomUUID(), name: 'Praise Kink', category: 'Verbal', intensity: 2, suggestions: ['Trade three specific compliments while maintaining eye contact.', 'Pair praise with a rule: every compliment earns the next move.', 'Write five praise lines and read them slowly.'] },
      { id: crypto.randomUUID(), name: 'Blindfold', category: 'Sensory', intensity: 2, suggestions: ['Try a blindfold and three different textures, then rate each one after.', 'Set a two-word stop phrase before starting and remove the blindfold halfway through.', 'Use sound cues only for one round.'] },
      { id: crypto.randomUUID(), name: 'Impact Tease', category: 'Impact', intensity: 4, suggestions: ['Start with over-clothes warmup and count intensity from 1 to 5 aloud.', 'Alternate light taps and pauses so anticipation stays in charge.', 'End with aftercare chosen before the scene starts.'] },
      { id: crypto.randomUUID(), name: 'Roleplay', category: 'Fantasy', intensity: 3, suggestions: ['Each person writes one scenario seed, then spin to choose which one happens.', 'Set a clear start phrase and end phrase so the scene has boundaries.', 'Keep costumes optional and focus on voice or attitude first.'] },
      { id: crypto.randomUUID(), name: 'Toy Exploration', category: 'Toys', intensity: 3, suggestions: ['Limit the round to one toy and one new setting.', 'Try a yes-maybe-no check before pressing spin again.', 'Create a scorecard for comfort, excitement, and interest.'] },
      { id: crypto.randomUUID(), name: 'Temperature Play', category: 'Sensory', intensity: 2, suggestions: ['Use safe warm/cool objects only and test on the inner wrist first.', 'Alternate temperatures while one person guesses the object.', 'Keep a towel nearby and do a quick comfort check every few minutes.'] },
      { id: crypto.randomUUID(), name: 'Exhibition Fantasy', category: 'Fantasy', intensity: 4, suggestions: ['Keep it talk-only and build the scene verbally without acting it out.', 'Set a realism rule: fantasy stays fantasy unless both explicitly re-approve.', 'Take turns narrating one escalating detail at a time.'] }
    ];

    const state = { items: structuredClone(defaultItems), categoryFilter: 'All', maxIntensity: 5, currentId: null, spinning: false, rotation: 0, theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light', activeSheetTab: 'edit', editingId: null, sheetOpen: false };
    const els = {
      canvas: document.getElementById('wheelCanvas'), spinBtn: document.getElementById('spinBtn'),
      resultName: document.getElementById('resultName'), resultCategory: document.getElementById('resultCategory'), resultIntensity: document.getElementById('resultIntensity'), resultSuggestion: document.getElementById('resultSuggestion'), suggestionCard: document.getElementById('suggestionCard'),
      addBtn: document.getElementById('addBtn'), itemList: document.getElementById('itemList'), categoryPills: document.getElementById('categoryPills'), saveBtn: document.getElementById('saveBtn'), loadBtn: document.getElementById('loadBtn'), fileInput: document.getElementById('fileInput'),
      categoryFilter: document.getElementById('categoryFilter'), maxIntensity: document.getElementById('maxIntensity'), kinkName: document.getElementById('kinkName'), kinkCategory: document.getElementById('kinkCategory'), kinkIntensity: document.getElementById('kinkIntensity'), kinkSuggestions: document.getElementById('kinkSuggestions'),
      timerSelect: document.getElementById('timerSelect'), timerDisplay: document.getElementById('timerDisplay'), timerStartBtn: document.getElementById('timerStartBtn'), timerStopBtn: document.getElementById('timerStopBtn'),
      navButtons: [...document.querySelectorAll('.nav-btn')], sheetOverlay: document.getElementById('sheetOverlay'), manageSheet: document.getElementById('manageSheet'), sheetCloseBtn: document.getElementById('sheetCloseBtn'), sheetTabButtons: [...document.querySelectorAll('[data-sheet-tab]')], tabPanels: { edit: document.getElementById('panel-edit'), items: document.getElementById('panel-items') },
    };

    let timerInterval = null, timerRemaining = 60;
    const TAU = Math.PI * 2, POINTER_ANGLE = -Math.PI / 2;
    document.documentElement.setAttribute('data-theme', state.theme);
    document.querySelector('[data-theme-toggle]').addEventListener('click', () => { state.theme = state.theme === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', state.theme); document.querySelector('meta[name="theme-color"]').setAttribute('content', state.theme === 'dark' ? '#13110f' : '#f6f3ef'); drawWheel(); });

    function setBottomNav(active) { els.navButtons.forEach(btn => btn.classList.toggle('is-active', btn.dataset.navTarget === active)); }
    function setSheetTab(tab) { state.activeSheetTab = tab; els.sheetTabButtons.forEach(btn => btn.classList.toggle('is-active', btn.dataset.sheetTab === tab)); Object.entries(els.tabPanels).forEach(([key, panel]) => panel.classList.toggle('is-active', key === tab)); }
    function openSheet(tab = 'edit') { state.sheetOpen = true; setSheetTab(tab); els.sheetOverlay.hidden = false; els.sheetOverlay.classList.add('is-open'); els.manageSheet.classList.add('is-open'); els.manageSheet.setAttribute('aria-hidden', 'false'); setBottomNav(tab); }
    function closeSheet() { state.sheetOpen = false; els.sheetOverlay.classList.remove('is-open'); els.manageSheet.classList.remove('is-open'); els.manageSheet.setAttribute('aria-hidden', 'true'); setBottomNav('play'); setTimeout(() => { if (!state.sheetOpen) els.sheetOverlay.hidden = true; }, 220); }

    els.sheetCloseBtn.addEventListener('click', closeSheet);
    els.sheetOverlay.addEventListener('click', closeSheet);
    els.sheetTabButtons.forEach(btn => btn.addEventListener('click', () => setSheetTab(btn.dataset.sheetTab)));
    els.navButtons.forEach(btn => btn.addEventListener('click', () => { const target = btn.dataset.navTarget; if (target === 'play') { closeSheet(); window.scrollTo({ top: 0, behavior: 'smooth' }); return; } openSheet(target); }));
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
    }

    const getCss = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const normalizeAngle = angle => ((angle % TAU) + TAU) % TAU;
    const getFilteredItems = () => state.items.filter(item => (state.categoryFilter === 'All' || item.category === state.categoryFilter) && item.intensity <= state.maxIntensity);
    const uniqueCategories = () => ['All', ...new Set(state.items.map(item => item.category).sort((a,b) => a.localeCompare(b)))];
    function categoryColor(category, i) { const palette = [['#b94f7f','#d980a5'],['#5f90b2','#8eb7d4'],['#c78e34','#e3bd72'],['#678a4f','#9dc280'],['#8a69c4','#b095e0'],['#bc6e4e','#db9877'],['#5e9d95','#8bc0ba'],['#a55a88','#d489b1']]; let sum = 0; for (const ch of category) sum += ch.charCodeAt(0); return palette[(sum + i) % palette.length]; }
    const getRandomSuggestion = item => !item?.suggestions?.length ? 'No suggestion available.' : item.suggestions[Math.floor(Math.random() * item.suggestions.length)];
    const escapeHtml = value => String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    function formatSuggestion(suggestion) { const text = String(suggestion || '').trim(); if (text.includes('|')) { const [label, url] = text.split('|'); const safeUrl = (url || '').trim(); if (/^https?:\/\//i.test(safeUrl)) return `<a href="${escapeHtml(safeUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label.trim() || safeUrl)}</a>`; } return escapeHtml(text).replace(/(https?:\/\/[^\s]+)/gi,'<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'); }
    function updateResult(item, keepSuggestion = false) { if (!item) { els.resultName.textContent = ''; els.resultCategory.textContent = 'Spin to begin'; els.resultIntensity.textContent = ''; els.resultSuggestion.innerHTML = ''; els.suggestionCard.hidden = true; els.resultName.dataset.currentId = ''; state.currentId = null; return; } els.resultName.textContent = item.name; els.resultCategory.textContent = item.category; els.resultIntensity.textContent = `Intensity ${item.intensity}`; if (!keepSuggestion || els.resultName.dataset.currentId !== item.id) { els.resultSuggestion.innerHTML = formatSuggestion(getRandomSuggestion(item)); } els.suggestionCard.hidden = false; els.resultName.dataset.currentId = item.id; state.currentId = item.id; }
    function hexToRgb(input) { const hex = input.replace('#', '').trim(); if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null; return { r: parseInt(hex.slice(0,2), 16), g: parseInt(hex.slice(2,4), 16), b: parseInt(hex.slice(4,6), 16) }; }
    function colorMix(hexA, hexB, weight = 0.5) { const c1 = hexToRgb(hexA), c2 = hexToRgb(hexB); if (!c1 || !c2) return hexA; return `rgb(${Math.round(c1.r + (c2.r - c1.r) * weight)}, ${Math.round(c1.g + (c2.g - c1.g) * weight)}, ${Math.round(c1.b + (c2.b - c1.b) * weight)})`; }

    function drawWheel() {
      const items = getFilteredItems(), ctx = els.canvas.getContext('2d'), size = els.canvas.width, center = size / 2, radius = size * 0.43, borderColor = getCss('--color-border'), textColor = getCss('--color-text'), mutedText = getCss('--color-text-muted'), surface = getCss('--color-surface'), surfaceOffset = getCss('--color-surface-offset');
      ctx.clearRect(0, 0, size, size); ctx.save(); ctx.translate(center, center); ctx.rotate(state.rotation);
      if (!items.length) { ctx.fillStyle = surfaceOffset; ctx.beginPath(); ctx.arc(0, 0, radius, 0, TAU); ctx.fill(); ctx.lineWidth = 10; ctx.strokeStyle = borderColor; ctx.stroke(); ctx.rotate(-state.rotation); ctx.fillStyle = mutedText; ctx.font = '700 28px Inter, system-ui, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('No items', 0, 0); ctx.restore(); return; }
      const segmentAngle = TAU / items.length;
      items.forEach((item, index) => { const start = index * segmentAngle, end = start + segmentAngle, [startColor, endColor] = categoryColor(item.category, index); const grad = ctx.createLinearGradient(Math.cos(start) * radius, Math.sin(start) * radius, Math.cos(end) * radius, Math.sin(end) * radius); grad.addColorStop(0, startColor); grad.addColorStop(1, endColor); ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, radius, start, end); ctx.closePath(); ctx.fillStyle = grad; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = colorMix(surface, borderColor, 0.5); ctx.stroke(); const mid = start + segmentAngle / 2; ctx.save(); ctx.rotate(mid); ctx.translate(radius * 0.67, 0); ctx.rotate(Math.PI / 2); ctx.fillStyle = textColor; ctx.font = `800 ${Math.max(16, Math.min(24, 190 / items.length))}px Inter, system-ui, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; const label = item.name.length > 16 ? `${item.name.slice(0, 14)}…` : item.name; ctx.fillText(label, 0, 0); ctx.restore(); });
      ctx.beginPath(); ctx.arc(0, 0, radius + 2, 0, TAU); ctx.lineWidth = 12; ctx.strokeStyle = borderColor; ctx.stroke(); ctx.beginPath(); ctx.arc(0, 0, radius * 0.18, 0, TAU); ctx.fillStyle = colorMix(surface, getCss('--color-primary'), 0.18); ctx.fill(); ctx.restore();
    }

    function renderFilters() { const categories = uniqueCategories(); els.categoryFilter.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join(''); if (!categories.includes(state.categoryFilter)) state.categoryFilter = 'All'; els.categoryFilter.value = state.categoryFilter; els.maxIntensity.value = String(state.maxIntensity); els.categoryPills.innerHTML = categories.filter(c => c !== 'All').map(cat => `<button type="button" class="${state.categoryFilter === cat ? 'is-active' : ''}" data-category="${cat}">${cat}</button>`).join(''); [...els.categoryPills.querySelectorAll('[data-category]')].forEach(btn => btn.addEventListener('click', () => { state.categoryFilter = btn.dataset.category === state.categoryFilter ? 'All' : btn.dataset.category; syncUi(); })); }
    function renderList() { const items = getFilteredItems(); els.itemList.innerHTML = items.map(item => `
        <article class="item">
          <div class="item-head">
            <div>
              <h3>${item.name}</h3>
              <div class="small">${item.category} · Intensity ${item.intensity}</div>
            </div>
            <div class="item-actions">
              <button class="btn btn-soft" type="button" data-edit="${item.id}">Edit</button>
              <button class="btn danger" type="button" data-delete="${item.id}">Delete</button>
            </div>
          </div>
          <div class="small">${item.suggestions[0] || 'No suggestions yet.'}</div>
        </article>
      `).join('') || '<div class="empty">No items match the current filters.</div>'; [...els.itemList.querySelectorAll('[data-delete]')].forEach(btn => btn.addEventListener('click', () => { state.items = state.items.filter(item => item.id !== btn.dataset.delete); const remaining = getFilteredItems(); if (!remaining.find(item => item.id === state.currentId)) state.currentId = remaining[0]?.id ?? null; syncUi(); })); [...els.itemList.querySelectorAll('[data-edit]')].forEach(btn => btn.addEventListener('click', () => { const item = state.items.find(entry => entry.id === btn.dataset.edit); if (!item) return; els.kinkName.value = item.name; els.kinkCategory.value = item.category; els.kinkIntensity.value = String(item.intensity); els.kinkSuggestions.value = (item.suggestions || []).join('\n'); state.editingId = item.id; els.addBtn.textContent = 'Save changes'; openSheet('edit'); })); }
    function syncUi() { renderFilters(); renderList(); drawWheel(); const items = getFilteredItems(); const current = items.find(item => item.id === state.currentId) || items[0] || null; updateResult(current, true); }
    function targetRotationForIndex(index, count) { const segmentAngle = TAU / count, currentNormalized = normalizeAngle(state.rotation), winnerCenter = index * segmentAngle + segmentAngle / 2; let desiredNormalized = POINTER_ANGLE - winnerCenter; desiredNormalized = normalizeAngle(desiredNormalized); return state.rotation + 5 * TAU + normalizeAngle(desiredNormalized - currentNormalized); }
    const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
    function spinWheel() { const items = getFilteredItems(); if (!items.length || state.spinning) return; state.spinning = true; els.spinBtn.disabled = true; const winnerIndex = Math.floor(Math.random() * items.length), finalRotation = targetRotationForIndex(winnerIndex, items.length), startRotation = state.rotation, duration = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 3800, startTime = performance.now(); function frame(now) { const progress = duration === 0 ? 1 : Math.min(1, (now - startTime) / duration), eased = easeOutCubic(progress); state.rotation = startRotation + (finalRotation - startRotation) * eased; drawWheel(); if (progress < 1) return requestAnimationFrame(frame); state.rotation = normalizeAngle(finalRotation); state.spinning = false; els.spinBtn.disabled = false; updateResult(items[winnerIndex]); drawWheel(); } requestAnimationFrame(frame); }
    function resetEditor() { els.kinkName.value = ''; els.kinkCategory.value = ''; els.kinkIntensity.value = '3'; els.kinkSuggestions.value = ''; state.editingId = null; els.addBtn.textContent = 'Add to wheel'; }
    function addOrUpdateItem() { const name = els.kinkName.value.trim(), category = els.kinkCategory.value.trim(), intensity = Number(els.kinkIntensity.value), suggestions = els.kinkSuggestions.value.split('\n').map(s => s.trim()).filter(Boolean); if (!name || !category) return; const payload = { id: state.editingId || crypto.randomUUID(), name, category, intensity, suggestions: suggestions.length ? suggestions : ['Try a short check-in first and decide on one small experiment.'] }; if (state.editingId) state.items = state.items.map(item => item.id === state.editingId ? payload : item); else state.items.unshift(payload); resetEditor(); syncUi(); openSheet('items'); }
    function exportJson() { const payload = { items: state.items, categoryFilter: state.categoryFilter, maxIntensity: state.maxIntensity }; const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'spinmates-save.json'; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 2000); }
    function importJson(file) { const reader = new FileReader(); reader.onload = () => { try { const data = JSON.parse(reader.result); if (!Array.isArray(data.items)) throw new Error('Invalid file'); state.items = data.items.map(item => ({ id: item.id || crypto.randomUUID(), name: String(item.name || 'Untitled'), category: String(item.category || 'Misc'), intensity: Math.max(1, Math.min(5, Number(item.intensity) || 1)), suggestions: Array.isArray(item.suggestions) ? item.suggestions.map(String) : [] })); state.categoryFilter = ['All', ...new Set(state.items.map(item => item.category))].includes(data.categoryFilter) ? data.categoryFilter : 'All'; state.maxIntensity = Math.max(1, Math.min(5, Number(data.maxIntensity) || 5)); renderFilters(); renderList(); drawWheel(); updateResult(null); closeSheet(); } catch { alert('Could not import that JSON file.'); } }; reader.readAsText(file); }
    const updateTimerDisplay = () => { const mins = String(Math.floor(timerRemaining / 60)).padStart(2, '0'), secs = String(timerRemaining % 60).padStart(2, '0'); els.timerDisplay.textContent = `${mins}:${secs}`; };
    function playBeep(audioCtx, startTime, duration = 0.16, frequency = 880) { const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(frequency, startTime); gain.gain.setValueAtTime(0.0001, startTime); gain.gain.exponentialRampToValueAtTime(0.22, startTime + 0.01); gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(startTime); osc.stop(startTime + duration); }
    function triggerAlarm() { try { const AudioCtx = window.AudioContext || window.webkitAudioContext; if (!AudioCtx) return; const audioCtx = new AudioCtx(), start = audioCtx.currentTime + 0.02; playBeep(audioCtx, start, 0.16, 880); playBeep(audioCtx, start + 0.24, 0.16, 880); playBeep(audioCtx, start + 0.48, 0.16, 880); setTimeout(() => audioCtx.close().catch(() => {}), 1200); } catch (e) {} }
    const stopTimer = () => { if (timerInterval) clearInterval(timerInterval); timerInterval = null; };
    function startTimer() { stopTimer(); timerRemaining = Number(els.timerSelect.value); updateTimerDisplay(); if (!timerRemaining) return; timerInterval = setInterval(() => { timerRemaining -= 1; updateTimerDisplay(); if (timerRemaining <= 0) { stopTimer(); triggerAlarm(); } }, 1000); }

    els.spinBtn.addEventListener('click', spinWheel);
    els.addBtn.addEventListener('click', addOrUpdateItem);
    els.saveBtn.addEventListener('click', exportJson);
    els.loadBtn.addEventListener('click', () => els.fileInput.click());
    els.fileInput.addEventListener('change', event => { const file = event.target.files?.[0]; if (file) importJson(file); event.target.value = ''; });
    els.categoryFilter.addEventListener('change', event => { state.categoryFilter = event.target.value; syncUi(); });
    els.maxIntensity.addEventListener('change', event => { state.maxIntensity = Number(event.target.value); syncUi(); });
    els.timerSelect.addEventListener('change', () => { timerRemaining = Number(els.timerSelect.value); updateTimerDisplay(); stopTimer(); });
    els.timerStartBtn.addEventListener('click', startTimer);
    els.timerStopBtn.addEventListener('click', () => { stopTimer(); timerRemaining = Number(els.timerSelect.value); updateTimerDisplay(); });

    updateTimerDisplay();
    setBottomNav('play');
    updateResult(null);
    renderFilters();
    renderList();
    drawWheel();
  </script>
